---
- name: Verify AEGIS Spoke ApplicationSet
  hosts: hub_eks
  gather_facts: false

  tasks:
    - name: Check required local commands
      ansible.builtin.shell: "command -v {{ item }}"
      args:
        executable: /bin/bash
      changed_when: false
      loop:
        - aws
        - kubectl
        - jq

    - name: Update kubeconfig for Hub EKS
      ansible.builtin.command:
        cmd: "{{ update_kubeconfig_command }}"
      changed_when: true

    - name: Read AEGIS Spoke ApplicationSet
      ansible.builtin.command:
        cmd: "kubectl -n {{ argocd_namespace }} get applicationset {{ gitops_applicationset_name }} -o json"
      register: gitops_applicationset_json
      changed_when: false

    - name: Read factory-a Application
      ansible.builtin.command:
        cmd: "kubectl -n {{ argocd_namespace }} get application {{ gitops_factory_a_application_name }} -o json"
      register: gitops_factory_a_application_json
      changed_when: false

    - name: Parse GitOps resources
      ansible.builtin.set_fact:
        gitops_applicationset: "{{ gitops_applicationset_json.stdout | from_json }}"
        gitops_factory_a_application: "{{ gitops_factory_a_application_json.stdout | from_json }}"

    - name: Assert ApplicationSet source
      ansible.builtin.assert:
        that:
          - gitops_applicationset.spec.generators[0].git.repoURL == gitops_repo_url
          - gitops_applicationset.spec.generators[0].git.revision == gitops_repo_revision
          - gitops_applicationset.spec.generators[0].git.files[0].path == gitops_applicationset_values_file_glob
        fail_msg: "ApplicationSet source does not match expected GitOps repo settings"

    - name: Assert factory-a Application target
      ansible.builtin.assert:
        that:
          - gitops_factory_a_application.spec.destination.name == tailscale_factory_a_name
          - gitops_factory_a_application.spec.destination.namespace == gitops_applicationset_destination_namespace
          - gitops_factory_a_application.spec.sources[0].repoURL == gitops_repo_url
          - gitops_factory_a_application.spec.sources[0].path == gitops_applicationset_chart_path
          - gitops_factory_a_application.spec.sources[1].repoURL == gitops_repo_url
        fail_msg: "factory-a Application does not point at the expected repo or destination"

    - name: Print ApplicationSet verification summary
      ansible.builtin.debug:
        msg:
          - "ApplicationSet {{ gitops_applicationset_name }} uses {{ gitops_repo_url }}@{{ gitops_repo_revision }}"
          - "Application {{ gitops_factory_a_application_name }} targets cluster {{ gitops_factory_a_application.spec.destination.name }} namespace {{ gitops_factory_a_application.spec.destination.namespace }}"
          - "Sync status: {{ gitops_factory_a_application.status.sync.status | default('unknown') }}"
          - "Health status: {{ gitops_factory_a_application.status.health.status | default('unknown') }}"
