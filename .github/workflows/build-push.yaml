name: Build and Push Edge Agent

on:
  push:
    branches:
      - main
    paths:
      - apps/edge-agent/**
      - .github/workflows/build-push.yaml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  AWS_ROLE_TO_ASSUME: arn:aws:iam::611058323802:role/AEGIS-GitHubActions-ECRPush
  ECR_REPOSITORY: aegis/edge-agent

jobs:
  build-push:
    name: Build and push ARM64 image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          registry="${{ steps.login-ecr.outputs.registry }}"
          echo "sha_tag=sha-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "image=${registry}/${ECR_REPOSITORY}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/edge-agent
          file: apps/edge-agent/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.image }}:main
            ${{ steps.image.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Print pushed image
        run: |
          echo "Pushed ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_tag }}"

