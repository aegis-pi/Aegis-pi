---
- name: Bootstrap Hub ArgoCD on EKS
  hosts: hub_eks
  gather_facts: false

  vars:
    bootstrap_manifest: "{{ playbook_dir }}/../files/hub-bootstrap.yaml"
    argocd_values_file: "{{ playbook_dir }}/../files/argocd-values.yaml"

  tasks:
    - name: Check required local commands
      ansible.builtin.shell: "command -v {{ item }}"
      args:
        executable: /bin/bash
      register: required_command_check
      changed_when: false
      loop:
        - aws
        - kubectl
        - helm

    - name: Update kubeconfig for Hub EKS
      ansible.builtin.command:
        cmd: "{{ update_kubeconfig_command | default('aws eks update-kubeconfig --region ' ~ aws_region ~ ' --name ' ~ eks_cluster_name) }}"
      changed_when: true

    - name: Verify Kubernetes API access
      ansible.builtin.command:
        cmd: kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Apply Hub namespace and LimitRange baseline
      ansible.builtin.command:
        cmd: "kubectl apply -f {{ bootstrap_manifest }}"
      register: hub_bootstrap_apply
      changed_when: "'created' in hub_bootstrap_apply.stdout or 'configured' in hub_bootstrap_apply.stdout"

    - name: Apply risk normalizer IRSA service account
      ansible.builtin.shell: |
        kubectl -n {{ risk_normalizer_service_account_namespace }} create serviceaccount {{ risk_normalizer_service_account_name }} --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      register: risk_normalizer_service_account_apply
      changed_when: "'created' in risk_normalizer_service_account_apply.stdout or 'configured' in risk_normalizer_service_account_apply.stdout"

    - name: Annotate risk normalizer IRSA service account
      ansible.builtin.command:
        cmd: >-
          kubectl -n {{ risk_normalizer_service_account_namespace }}
          annotate serviceaccount {{ risk_normalizer_service_account_name }}
          eks.amazonaws.com/role-arn={{ risk_normalizer_irsa_role_arn }}
          --overwrite
      register: risk_normalizer_service_account_annotate
      changed_when: "'annotated' in risk_normalizer_service_account_annotate.stdout"

    - name: Apply Prometheus remote_write IRSA service account
      ansible.builtin.shell: |
        kubectl -n {{ prometheus_remote_write_service_account_namespace }} create serviceaccount {{ prometheus_remote_write_service_account_name }} --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      register: prometheus_remote_write_service_account_apply
      changed_when: "'created' in prometheus_remote_write_service_account_apply.stdout or 'configured' in prometheus_remote_write_service_account_apply.stdout"

    - name: Annotate Prometheus remote_write IRSA service account
      ansible.builtin.command:
        cmd: >-
          kubectl -n {{ prometheus_remote_write_service_account_namespace }}
          annotate serviceaccount {{ prometheus_remote_write_service_account_name }}
          eks.amazonaws.com/role-arn={{ prometheus_remote_write_irsa_role_arn }}
          --overwrite
      register: prometheus_remote_write_service_account_annotate
      changed_when: "'annotated' in prometheus_remote_write_service_account_annotate.stdout"

    - name: Read existing ArgoCD Helm release
      ansible.builtin.command:
        cmd: "helm list --namespace {{ argocd_namespace }} --filter '^{{ argocd_release_name }}$' --output json"
      register: argocd_helm_release_list
      changed_when: false

    - name: Parse existing ArgoCD Helm release
      ansible.builtin.set_fact:
        argocd_helm_releases: "{{ argocd_helm_release_list.stdout | from_json }}"

    - name: Select existing ArgoCD Helm release
      ansible.builtin.set_fact:
        argocd_helm_release: "{{ (argocd_helm_releases | first) if (argocd_helm_releases | length > 0) else {} }}"

    - name: Decide whether ArgoCD Helm apply is needed
      ansible.builtin.set_fact:
        argocd_helm_apply_required: >-
          {{
            argocd_force_upgrade | bool
            or argocd_helm_release | length == 0
            or (argocd_helm_release.status | default('')) != 'deployed'
            or (argocd_helm_release.chart | default('')) != ('argo-cd-' ~ argocd_chart_version)
          }}

    - name: Show ArgoCD Helm apply decision
      ansible.builtin.debug:
        msg: >-
          ArgoCD Helm apply required={{ argocd_helm_apply_required }};
          force={{ argocd_force_upgrade | bool }};
          installed={{ argocd_helm_release.chart | default('none') }};
          status={{ argocd_helm_release.status | default('none') }}

    - name: Add or update ArgoCD Helm repository
      ansible.builtin.command:
        cmd: "helm repo add {{ argocd_helm_repo_name }} {{ argocd_helm_repo_url }} --force-update"
      register: argocd_repo_add
      changed_when: "'has been added' in argocd_repo_add.stdout or 'has been updated' in argocd_repo_add.stdout"
      when: argocd_helm_apply_required | bool

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: true
      when: argocd_helm_apply_required | bool

    - name: Install or upgrade Hub ArgoCD
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install {{ argocd_release_name }} {{ argocd_chart_ref }}
          --namespace {{ argocd_namespace }}
          --version {{ argocd_chart_version }}
          --values {{ argocd_values_file }}
          --wait
          --timeout 10m
      register: argocd_helm_apply
      changed_when: "'Release' in argocd_helm_apply.stdout"
      when: argocd_helm_apply_required | bool

    - name: Wait for argocd-server deployment
      ansible.builtin.command:
        cmd: "kubectl -n {{ argocd_namespace }} wait --for=condition=available --timeout=180s deployment/argocd-server"
      changed_when: false

    - name: Verify argocd-server service remains private
      ansible.builtin.command:
        cmd: "kubectl -n {{ argocd_namespace }} get svc argocd-server -o jsonpath={.spec.type}"
      register: argocd_server_service_type_result
      changed_when: false

    - name: Assert argocd-server service type
      ansible.builtin.assert:
        that:
          - argocd_server_service_type_result.stdout == argocd_server_service_type
        fail_msg: "argocd-server service type is {{ argocd_server_service_type_result.stdout }}, expected {{ argocd_server_service_type }}"

    - name: Verify Hub namespaces
      ansible.builtin.command:
        cmd: "kubectl get namespace {{ item.name }} -o jsonpath={.status.phase}"
      register: namespace_status
      changed_when: false
      loop: "{{ hub_namespaces }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Assert Hub namespaces are active
      ansible.builtin.assert:
        that:
          - item.stdout == "Active"
        fail_msg: "Namespace {{ item.item.name }} is not Active"
      loop: "{{ namespace_status.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Read initial admin password when explicitly requested
      ansible.builtin.command:
        cmd: "kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret -o jsonpath={.data.password}"
      register: argocd_initial_admin_password_b64
      changed_when: false
      no_log: true
      when: argocd_print_initial_admin_password | bool

    - name: Print initial admin password when explicitly requested
      ansible.builtin.debug:
        msg: "{{ argocd_initial_admin_password_b64.stdout | b64decode }}"
      when: argocd_print_initial_admin_password | bool

    - name: Show ArgoCD UI access command
      ansible.builtin.debug:
        msg: "Run scripts/hub/argocd-port-forward.sh, then open https://127.0.0.1:{{ argocd_local_port }}"
